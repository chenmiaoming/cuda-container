name: PR Docker Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-docker-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ci-gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - cuda-sshd-13.0.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect changed Dockerfiles
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -qE '\.Dockerfile$'; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -qE '^\.github/workflows/'; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.changed.outputs.build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        if: steps.changed.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          outputs: type=cacheonly
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          provenance: false
          sbom: false

      - name: No Dockerfile changes
        if: steps.changed.outputs.build == 'false'
        run: echo "No Dockerfile changes; CI passed."
